---
# OpenZFS on Fedora is shipped as a kernel module via the official
# zfsonlinux.org repo. kmod vs. dkms: we default to kmod because it doesn't
# rebuild on every kernel update (faster reboots, no rebuild breakage).
# Bump this as OpenZFS releases new -release RPMs (check zfsonlinux.org/fedora).
forge_zfs_repo_release_version: "2-7"
forge_zfs_repo_rpm: "https://zfsonlinux.org/fedora/zfs-release-{{ forge_zfs_repo_release_version }}.fc{{ ansible_distribution_major_version }}.noarch.rpm"
forge_zfs_package_variant: kmod   # kmod | dkms

forge_zfs_packages:
  - zfs
  - zfs-dracut

forge_zfs_services:
  - zfs-import-cache.service
  - zfs-import.target
  - zfs-mount.service
  - zfs-zed.service
  - zfs.target

# Re-declared in group_vars/forge/vars.yml — kept here for role isolation.
forge_zfs_pools: []
forge_zfs_datasets: []
forge_zfs_arc_max: 0
