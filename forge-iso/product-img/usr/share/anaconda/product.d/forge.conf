# Anaconda installer branding for the forge Linux installer.
#
# This file is unpacked into the running installer environment by anaconda
# when the product.img is loaded from /images/product.img on the ISO. It
# overrides the default Fedora branding strings + artwork paths so the
# installer UI says "forge" instead of "Fedora".
#
# Reference: https://anaconda-installer.readthedocs.io/en/latest/product.html

[Product]
product_name = forge Linux

[Base Product]
product_name = Fedora
product_version = %FEDORA_VERSION%

[Installation System]
can_detect_unsupported_hardware = False
can_detect_support_removed = False

[User Interface]
custom_stylesheet = /usr/share/anaconda/pixmaps/forge-sidebar.png
help_directory = /usr/share/anaconda/help/forge

[License]
eula = /usr/share/anaconda/eula/forge-eula.txt

[Payload]
default_source = CLOSEST_MIRROR
default_rpm_gpg_keys =
    /etc/pki/rpm-gpg/RPM-GPG-KEY-fedora-$releasever-$basearch

[Bootloader]
menu_auto_hide = False
